<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Practice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <header id="header" class="header">
        <nav class="navbar">
            <h1 >ᴡᴇʙᴀᴅᴀꜱ</h1>
        </nav>
    </header>

    <!-- Exercise 1 Comparador de Textos -->
    <section class="exercise1">
        <h2>Comparador de Textos</h2>
        <input type="text" id="text1" placeholder="Ingrese el primer texto">
        <input type="text" id="text2" placeholder="Ingrese el segundo texto">
        <button id="compareBtn">Comparar</button>
        <p id="result"></p>
    </section>

    <!-- Exercise 2 Contador de letras -->
    <section class="exercise2">
        <h2>Contador de Letras</h2>
        <input type="text" id="textToCount" placeholder="Ingrese un texto">
        <button id="countBtn">Contar Letras</button>
        <p id="countResult"></p>
    </section>

    <!-- Exercise 3 Raiz Cuadrada -->
    <section class="exercise3">
        <h2>Raiz Cuadrada</h2>
        <input type="number" id="numberInput" placeholder="Ingrese un número">
        <button id="sqrtBtn">Calcular Raíz Cuadrada</button>
        <p id="sqrtResult"></p>
    </section>

    <!-- Exercise 4 Cambio de color (header/footer) -->
    <section class="exercise4">
        <h2>Cambio de Color</h2>
        <h3>Cambiar Color del Header</h3>
        <label>
            <input type="radio" name="headerColor" value="headerNormal" id="headerNormal" onclick="cambiacolorH()">
            Normal
        </label>
        <label>
            <input type="radio" name="headerColor" value="headerRed" id="headerRed" onclick="cambiacolorH()"> Rojo
        </label>
        <label>
            <input type="radio" name="headerColor" value="headerGreen" id="headerGreen" onclick="cambiacolorH()"> Verde
        </label>
        <label>
            <input type="radio" name="headerColor" value="headerBlue" id="headerBlue" onclick="cambiacolorH()">
            Azul
        </label>
        <h3>Cambiar Color del Footer</h3>
        <label>
            <input type="radio" name="footerColor" value="footerNormal" id="footerNormal" onclick="cambiacolorF()">
            Normal
        </label>
        <label>
            <input type="radio" name="footerColor" value="footerRed" id="footerRed" onclick="cambiacolorF()"> Rojo
        </label>
        <label>
            <input type="radio" name="footerColor" value="footerGreen" id="footerGreen" onclick="cambiacolorF()"> Verde
        </label>
        <label>
            <input type="radio" name="footerColor" value="footerBlue" id="footerBlue" onclick="cambiacolorF()"> Azul
        </label>
    </section>
    <!-- Exercise 5 Altura y ancho de una imagen -->
    <section class="exercise5">
        <h2>Altura y Ancho de una Imagen</h2>
        <div class="image-size">
            <label>Altura: </label>
            <input type="number" id="height" onkeyup="cambiatamaño()" max="400">
            <label>Anchura: </label>
            <input type="number" id="width" onkeyup="cambiatamaño()" max="800">
            <br><br>
            <img class="image" id="image" src="deidad.jpg">
        </div>
    </section>
    <!-- Exercise 6 Gestion de los pedidos de una cafeteria -->
    <section class="exercise6">
        <h2>Gestión de Pedidos de una Cafetería</h2>
    </section>
    <footer id="footer" class="footer">
        <p>&copy; 2025 Alejandro Polo. Cranear duele...</p>
    </footer>
</body>

</html>
